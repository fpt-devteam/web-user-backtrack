<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" fill="none" role="img" aria-label="Backtrack logo">
  <defs>
    <!-- Brand cyan gradient: oklch(0.609) → oklch(0.520) ≈ #0891B2 → #0E7490 -->
    <linearGradient id="brand-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0E7490"/>
    </linearGradient>

    <!-- Subtle inner glow for icon mark -->
    <filter id="icon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Clip circle for the icon mark -->
    <clipPath id="icon-clip">
      <rect x="0" y="4" width="32" height="32" rx="9"/>
    </clipPath>
  </defs>

  <!-- ── Icon mark: rounded square ── -->
  <rect x="0" y="4" width="32" height="32" rx="9" fill="url(#brand-grad)"/>

  <!-- Subtle top highlight -->
  <rect x="0" y="4" width="32" height="16" rx="9" fill="white" opacity="0.10" clip-path="url(#icon-clip)"/>

  <!-- Arrow-back pin: rotated arrow + dot = "retrace your steps" -->
  <!-- Outer hexagon-like path (location pin feel) -->
  <path
    d="M16 10 L22 13.5 L22 20.5 L16 24 L10 20.5 L10 13.5 Z"
    stroke="white"
    stroke-width="1.5"
    stroke-linejoin="round"
    fill="none"
    opacity="0.9"
  />
  <!-- Inner dot — the "found" point -->
  <circle cx="16" cy="17" r="2.5" fill="white"/>

  <!-- Curved back-arrow above hex: "back" tracking motion -->
  <path
    d="M13 10.5 Q11 8 13 6 L16 7"
    stroke="white"
    stroke-width="1.4"
    stroke-linecap="round"
    fill="none"
    opacity="0.75"
  />
  <path
    d="M12.5 7 L13 10.5 L16.2 9.8"
    stroke="white"
    stroke-width="1.4"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    opacity="0.75"
  />

  <!-- ── Wordmark: "back" dark + "track" cyan ── -->
  <!-- Using font-family fallback in SVG via text element -->
  <text
    x="38"
    y="27"
    font-family="'Plus Jakarta Sans','Montserrat','Poppins','Inter',system-ui,sans-serif"
    font-size="20"
    font-weight="900"
    letter-spacing="-0.6"
    fill="#111111"
  >back</text>

  <text
    x="86"
    y="27"
    font-family="'Plus Jakarta Sans','Montserrat','Poppins','Inter',system-ui,sans-serif"
    font-size="20"
    font-weight="900"
    letter-spacing="-0.6"
    fill="url(#brand-grad)"
  >track</text>
</svg>
